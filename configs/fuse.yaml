# =============================================================================
# FUSE stage-1 joint training (all verifiers together):
#   L = L_CE(S_L) + alpha * L_NCL(S_L) + lambda * L_TCI(S_U)
# Verifiers = modalities x backbones x n_answers (NCL). Backbones frozen; only
# the linear/mlp heads train. See docs/FUSE_TCI_spec.md.
# =============================================================================

verifiers:
  modalities: ["MG", "US"]
  backbones: null            # null = all backbones found under features/<set>/<modality>

head:
  type: "linear"             # linear | mlp
  mlp_layers: [256]
  dropout: 0.1
  n_answers: 2               # NCL answers per head -> 2 verifiers per (modality,backbone)
  standardize: true          # z-score each verifier's features (fit on S_L)
  class_weight: "balanced"

train:
  warmstart_epochs: 300      # L_CE + alpha*L_NCL only (accurate + distinct twins)
  joint_epochs: 500          # add lambda*L_TCI on S_U
  lr: 0.001
  weight_decay: 0.0001
  alpha_ncl: 0.1             # gentle (marginal); just breaks the twin-collapse
  lambda_tci: 1.0            # the real diversity force (conditional, on S_U)
  tci_eps: 0.05              # epsilon-floor on |Sigma_ab| in the TCI denominator
  log_every: 50

io:
  features_dir: "artifacts/features"   # FUSE_FEATURES_DIR overrides
  labeled_set: "labeled"
  unlabeled_set: "unlabeled"
  test_set: "test"
  out_dir: "artifacts/fuse"
